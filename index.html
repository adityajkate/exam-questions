<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Questions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hero">
        <h1 class="hero-title">Exam Questions</h1>
        <p class="hero-subtitle">Select a subject to view questions</p>
    </div>

    <div class="subjects-grid">
        <div class="subject-card" data-subject="dc">
            <div class="subject-code">DC</div>
            <div class="subject-name">Distributed Computing</div>
        </div>

        <div class="subject-card" data-subject="ml">
            <div class="subject-code">ML</div>
            <div class="subject-name">Machine Learning</div>
        </div>

        <div class="subject-card" data-subject="sepm">
            <div class="subject-code">SEPM</div>
            <div class="subject-name">Software Engineering & Project Management</div>
        </div>

        <div class="subject-card" data-subject="dav">
            <div class="subject-code">DAV</div>
            <div class="subject-name">Data Analytics & Visualization</div>
        </div>

        <div class="subject-card" data-subject="css">
            <div class="subject-code">CSS</div>
            <div class="subject-name">Cryptography & System Security</div>
        </div>
    </div>

    <script src="https://unpkg.com/lenis@1.1.20/dist/lenis.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
